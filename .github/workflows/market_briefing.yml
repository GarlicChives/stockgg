name: Publish daily site

# Triggered nightly + on demand. Analysis is no longer done here — it runs
# on the user's Mac (StockGG-ingest repo) and writes to Supabase. This
# workflow only re-renders docs/index.html from current DB state and pushes
# it to Cloudflare Workers.

on:
  schedule:
    - cron: '30 23 * * 1-5'   # 07:30 TW weekdays — after daily-briefing
    - cron: '15 10 * * *'     # 18:15 TW — after 18:00 market_notes
    - cron: '15 15 * * *'     # 23:15 TW — after 23:00 market_notes
  workflow_dispatch:           # manual trigger
  repository_dispatch:         # POSTed from StockGG-ingest after analysis writes
    types: [analysis-updated]

permissions:
  contents: write              # needed to push docs/index.html

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Generate HTML page
        run: uv run scripts/generate_html.py
        env:
          # Public-safe anon key; reaches DB only via db-proxy-public's
          # 9-pattern SQL allowlist. service_role key never enters this repo.
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Commit HTML to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update daily report [skip ci]" && git push

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
