name: Publish daily site

# Triggered nightly + on demand. Analysis is no longer done here — it runs
# on the user's Mac (StockGG-ingest repo) and writes to Supabase. This
# workflow only re-renders docs/index.html from current DB state and pushes
# it to Cloudflare Workers.

on:
  schedule:
    - cron: '30 23 * * 1-5'   # 07:30 TW weekdays — after daily-briefing
    - cron: '15 10 * * *'     # 18:15 TW — after 18:00 market_notes
    - cron: '15 15 * * *'     # 23:15 TW — after 23:00 market_notes
  workflow_dispatch:           # manual trigger
  repository_dispatch:         # POSTed from StockGG-ingest after analysis writes
    types: [analysis-updated]

# 同 workflow 同時只一個 instance(排隊不取消),避免兩個 run 交錯 deploy
# 把較舊的 render 蓋到較新的上面。
concurrency:
  group: publish-daily-site
  cancel-in-progress: false

permissions:
  contents: read               # 只需 checkout;建置產物不再 commit 回 repo

jobs:
  publish:
    runs-on: ubuntu-latest
    # generate 需抓「全部策略」資料(Q43–Q47 × N slug)+ 15MB history,隨策略數成長;
    # 原 5 分鐘 job timeout 在 6 策略時 generate+install 已逼近上限、deploy step 一開始就被
    # 取消(2026-06-19 真因)。調寬到 12 分鐘給足 headroom。
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # Pin 確切版本 — setup-uv 自 v8 起移除浮動 major tag(`@v8` 不存在),
        # 官方改推 immutable tag。升新版時手動 bump。
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      # 歷史大表增量讀取快取(Disk IO 治本 B):跨 CI run 持久化 .cache/ 目錄
      # (kline / net_inst / theme_history 昨天以前的列)。key 用滾動 run_id +
      # restore-keys 前綴 → 每次 run 存新 key、還原靠前綴抓最近一次(ephemeral
      # runner 持久化標準作法)。缺快取 / 每週全量重建時 generate_html 自動走全量。
      - name: Restore history read-cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: site-histcache-${{ github.run_id }}
          restore-keys: |
            site-histcache-

      - name: Generate HTML page
        run: uv run scripts/generate_html.py
        env:
          # Public-safe anon key; reaches DB only via db-proxy-public's
          # 9-pattern SQL allowlist. service_role key never enters this repo.
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Deploy guard:杜絕「缺 index.html 的空版本」變成 active(2026-06-18 根 404
      # 根因)。docs/index.html 是 gitignored 生成檔;若 generate 靜默失敗/截斷,
      # 沒這道檢查就會 deploy 出只有 committed app.js+style.css、缺 index.html 的
      # 版本 → production alias 切過去全站根 404。
      - name: Verify generated assets before deploy
        run: |
          INDEX=docs/index.html
          test -f "$INDEX" || { echo "::error::$INDEX missing — refusing to deploy"; exit 1; }
          bytes=$(wc -c < "$INDEX" | tr -d ' ')
          if [ "$bytes" -lt 500000 ]; then
            echo "::error::$INDEX only ${bytes} bytes (<500000) — generation likely failed/truncated"; exit 1
          fi
          tail -c 64 "$INDEX" | grep -q "</html>" || { echo "::error::$INDEX not terminated by </html> — truncated"; exit 1; }
          if grep -lq "<<<<<<<" docs/index.html docs/app.js docs/style.css 2>/dev/null; then
            echo "::error::conflict marker detected — refusing to deploy"; exit 1
          fi
          echo "index.html ${bytes} bytes — OK to deploy"

      # 2026-06-11 起建置產物(docs/index.html + docs/history.json)不再
      # commit 回 repo:部署只靠下一步 wrangler 上傳工作目錄,commit 純屬
      # 冗餘,且 15MB+ 的 history.json × 每日多次 bot commit 把 .git 撐到
      # 3GB(public repo 任何人 clone 都要拉)。產物已加 .gitignore;
      # 原本的 push race / rebase retry 機制隨之整段消滅。
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin 具體版本 — `wranglerVersion: "4"` 浮動取最新會撈到 4.86.0
          # 撞 npx interactive prompt 卡住 (2026-05-19 踩到);pin 已測過的版本。
          wranglerVersion: "4.20.0"

      # 部署後 smoke test(liveness)。站台前有 Cloudflare Access:未登入的
      # production root 回 302(登入頁)而非 200,故接受 200 或 302 皆算活著。
      # 防「缺 index.html 空版本」的主防線是上面 deploy 前的 verify guard,不是這裡。
      # 非 200/302(403/404/5xx/000)才讓該 run 標紅、寄失敗通知。
      - name: Smoke test deployed site
        run: |
          URL=https://stockgg.v4578469.workers.dev/
          for i in 1 2 3 4 5; do
            sleep 3
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "attempt ${i}: HTTP ${code}"
            if [ "$code" = "200" ] || [ "$code" = "302" ]; then echo "site OK (HTTP ${code})"; exit 0; fi
          done
          echo "::error::deployed site root neither 200 nor 302 — investigate via version-preview URL"; exit 1
