name: Daily Market Briefing

on:
  schedule:
    - cron: '30 23 * * 1-5'  # 07:30 TW weekdays (UTC+8)
  workflow_dispatch:           # manual trigger

permissions:
  contents: write              # needed to push docs/index.html

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run daily briefing
        run: uv run scripts/daily_briefing.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Generate HTML page
        run: uv run scripts/generate_html.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update daily report [skip ci]" && git push
